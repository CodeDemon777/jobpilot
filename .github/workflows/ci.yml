name: JobPilot CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # =====================================================
  # Job 1: Code Quality & Linting
  # =====================================================
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit safety

      - name: Run Black (formatting check)
        run: black --check jobpilot/ tests/

      - name: Run Ruff (linting)
        run: ruff check jobpilot/ tests/

      - name: Run Bandit (security)
        run: bandit -r jobpilot/ -ll
        continue-on-error: true

  # =====================================================
  # Job 2: Unit Tests
  # =====================================================
  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unit Tests
        run: python tests/test_unit_all_modules.py

  # =====================================================
  # Job 3: API Tests
  # =====================================================
  api-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API Tests
        run: python tests/test_api_endpoints.py

  # =====================================================
  # Job 4: Security Tests
  # =====================================================
  security-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Security Tests
        run: python tests/test_security.py

  # =====================================================
  # Job 5: Performance Tests
  # =====================================================
  performance-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Performance Tests
        run: python tests/test_performance.py

  # =====================================================
  # Job 6: Scraper Validation
  # =====================================================
  scraper-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Validation Tests
        run: python tests/test_scraper_validation.py

  # =====================================================
  # Job 7: Integration Tests
  # =====================================================
  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, security-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Existing Integration Tests
        run: python tests/test_all_features.py

      - name: Run Original Test Suite
        run: python tests/test_full.py

  # =====================================================
  # Job 8: Comprehensive QA Suite
  # =====================================================
  comprehensive-qa:
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests, security-tests, performance-tests, scraper-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run All Tests
        run: python tests/run_all_tests.py

  # =====================================================
  # Job 9: Build & Deploy
  # =====================================================
  build:
    runs-on: ubuntu-latest
    needs: [comprehensive-qa]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jobpilot-package
          path: dist/
