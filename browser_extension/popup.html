<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPilot - Save Job</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="JobPilot" class="logo">
      <h1>JobPilot</h1>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="section">
      <h2>Login to JobPilot</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <p class="text-center">Don't have an account? <a href="#" id="show-register">Register</a></p>
    </div>

    <!-- Register Section -->
    <div id="register-section" class="section hidden">
      <h2>Create Account</h2>
      <form id="register-form">
        <input type="text" id="reg-name" placeholder="Name">
        <input type="email" id="reg-email" placeholder="Email" required>
        <input type="password" id="reg-password" placeholder="Password" required>
        <button type="submit" class="btn btn-primary">Register</button>
      </form>
      <p class="text-center">Already have an account? <a href="#" id="show-login">Login</a></p>
    </div>

    <!-- Save Job Section -->
    <div id="save-section" class="section hidden">
      <h2>Save This Job</h2>

      <div class="job-info">
        <div class="form-group">
          <label>Job Title</label>
          <input type="text" id="job-title" placeholder="Job title">
        </div>
        <div class="form-group">
          <label>Company</label>
          <input type="text" id="job-company" placeholder="Company name">
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="job-location" placeholder="Location">
        </div>
        <div class="form-group">
          <label>URL</label>
          <input type="url" id="job-url" placeholder="Job URL">
        </div>
        <div class="form-group">
          <label>Description (optional)</label>
          <textarea id="job-description" rows="3" placeholder="Job description"></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="save-btn" class="btn btn-primary">Save to JobPilot</button>
        <button id="analyze-btn" class="btn btn-secondary">Analyze Match</button>
      </div>

      <div id="save-result" class="hidden"></div>

      <div class="footer">
        <button id="logout-btn" class="btn btn-link">Logout</button>
        <a href="http://localhost:8000" target="_blank" class="btn btn-link">Open Dashboard</a>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
